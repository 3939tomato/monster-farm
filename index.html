<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モンスター牧場：生態系・RPG版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="farmScreen" class="screen active">
        <div id="targetMonitor">
            <canvas id="targetPreview" width="32" height="32"></canvas>
            <div id="targetStats"></div>
        </div>
        <button id="focusBtn" onclick="toggleFocus()">注目追従: OFF</button>
        <div id="zoomControl">
            <span style="font-size:12px; font-weight:bold;">ズーム</span>
            <input type="range" id="zoomSlider" min="5" max="300" value="30" oninput="handleSliderZoom(this.value)">
        </div>
        <div id="speedControl">
            <button class="speed-btn" onclick="setGameSpeed(0, this)">×0</button>
            <button class="speed-btn active-speed" onclick="setGameSpeed(1, this)">×1</button>
            <button class="speed-btn" onclick="setGameSpeed(2, this)">×2</button>
            <button class="speed-btn" onclick="setGameSpeed(5, this)">×5</button>
        </div>
        <div id="logPanel"></div>
        <div id="menuBtn" onclick="toggleMenu()">☰</div>
        <div id="menuPanel">
            <button class="btn" onclick="openReadme()" style="background:#2196F3;">ゲームの説明</button> 
            <button class="btn" onclick="saveGame()" style="background:#4CAF50;">セーブする</button>
            <button class="btn" onclick="resetGame()" style="background:#f44336;">データをリセット</button>
            <button class="btn" onclick="openEditor()">モンスターを描く</button>
            <button class="btn" onclick="openBook()" style="background:#795548;">図鑑・種族管理</button>
            <p style="margin:5px 0; font-size:14px;">牧場の総個体数: <span id="count">0</span></p>
            <div style="border-top:1px solid #ccc; padding-top:10px; margin-top:5px; font-size:13px;">
                BGM音量: <input type="range" min="0" max="1" step="0.01" value="0.1" oninput="changeVolume(this.value)" style="vertical-align:middle; width:80px;"><br>
                SE音量: &nbsp;&nbsp;<input type="range" min="0" max="1" step="0.01" value="0.1" oninput="changeSEVolume(this.value)" style="vertical-align:middle; width:80px; margin-top:5px;">
            </div>
            <div style="font-size:11px; color:#555; margin-top:10px; line-height:1.4;">
                BGM: Generated by Gemini (SynthID tagged)<br>
                SE: 効果音ラボ
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bookScreen" class="screen">
        <button class="btn" onclick="closeBook()" style="margin:20px;">戻る</button>
        <div class="book-container">
            <h2>種族管理センター</h2>
            <div id="bookGrid" class="book-grid"></div>
        </div>
    </div>

    <div id="editorScreen" class="screen">
        <div class="editor-container">
            <button onclick="closeEditor()" style="float:left;" class="btn">戻る</button>
            <h3>モンスターエディター</h3>
            <div style="margin:10px;">
                名前: <input type="text" id="speciesInput" value="ななし">
                食性: <select id="dietInput"><option value="雑食">雑食</option><option value="草食">草食</option><option value="肉食">肉食</option></select>
                属性: <select id="attrInput">
        <option value="ノーマル">⭐ ノーマル</option>
        <option value="火">🔥 火</option>
        <option value="水">💧 水</option>
        <option value="木">🌿 木</option>
        <option value="光">✨ 光</option>
        <option value="闇">🌑 闇</option>
                    </select>
    </div>
            </div>
            <canvas id="editorCanvas" width="320" height="320"></canvas>
            <div class="tools">
                <input type="color" id="colorPicker" value="#4444ff">
                <button id="penTool" class="tool-btn active-tool" onclick="setTool('pen')">ペン</button>
                <button id="eraserTool" class="tool-btn" onclick="setTool('eraser')">消しゴム</button>
                <button id="bucketTool" class="tool-btn" onclick="setTool('bucket')">バケツ</button>
                <button onclick="clearEd()" class="tool-btn">全消去</button>
                <span style="font-size:12px;">太さ: <input type="range" id="brushSize" min="1" max="4" value="1" style="width:60px;"></span>
            </div>
            <div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:10px;">
                耐暑🔥: <input type="number" id="heatResist" value="10" style="width:40px;" onchange="validateResist()">
                耐寒❄️: <input type="number" id="coldResist" value="10" style="width:40px;" onchange="validateResist()">
                <div id="resistError" style="color:red; font-size:11px;"></div>
                合計値: <input type="number" id="statMin" value="20" style="width:40px;">〜<input type="number" id="statMax" value="60" style="width:40px;">
                放流数: <input type="number" id="spawnCount" value="5" style="width:40px;">
            </div>
            <button class="btn" onclick="saveAndGoFarm()" style="background:#4CAF50; width:100%;">この種を放流する！</button>
        </div>
    </div>

    <script src="script.js"></script>

<div id="readmeOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
        <div id="readmeContent" style="position:relative; background:#fff; width:90%; height:90%; max-width:800px; padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.5); display:flex; flex-direction:column;">
            
            <button id="readmeCloseBtn" onclick="closeReadme()" style="position:absolute; top:10px; right:10px; background:#f44336; color:#fff; border:none; border-radius:50%; width:30px; height:30px; font-size:20px; font-weight:bold; cursor:pointer; line-height:30px; text-align:center; padding:0;">×</button>
            
            <h2 style="margin-top:0; border-bottom:2px solid #2196F3; padding-bottom:10px;">牧場の説明書 (README.md)</h2>
            
            <div id="readmeText" style="flex:1; background:#f9f9f9; border:1px solid #ddd; padding:15px; border-radius:5px; overflow-y:scroll; white-space:pre-wrap; font-family:monospace; font-size:14px; line-height:1.6; color:#333;">
                読み込み中...
            </div>
            
            <button class="btn" onclick="closeReadme()" style="background:#f44336; width:100%; margin-top:15px;">説明を閉じる</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
    
</body>
</html>
